<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#05070d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VICO Tékton"/>
<link rel="manifest" href="tekton-manifest.json"/>
<link rel="apple-touch-icon" href="tekton-icon.png"/>
<title>VICO Tékton | Modular Automation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --accent:#41a5ff;--accent2:#0ea5e9;--glow:rgba(65,165,255,.28);
  --bg:#05070d;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.10);
  --text:#fff;--muted:#94a3b8;--ticker-dur:28s;
  font-family:'Space Grotesk',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text)}
body{overflow-x:hidden}
::selection{background:rgba(65,165,255,.35);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:rgba(15,23,42,.4)}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--accent),#7c3aed);border-radius:999px}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,select,textarea{font-family:inherit;color:var(--text);background:rgba(0,0,0,.3);border:1px solid var(--border);outline:none;border-radius:16px;padding:10px 14px;font-size:.875rem;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:#0f172a}
label{cursor:pointer}
a{color:inherit;text-decoration:none}
iframe{border:none}

/* ── Layout ── */
.app{min-height:100vh;position:relative}
.bg-grid{pointer-events:none;position:fixed;inset:0;overflow:hidden;z-index:0}
.bg-grid::before{content:'';position:absolute;inset:0;background:
  radial-gradient(circle at 15% 15%,rgba(65,165,255,.18),transparent 34%),
  radial-gradient(circle at 85% 85%,rgba(124,58,237,.16),transparent 30%)}
.bg-grid::after{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:56px 56px;opacity:.06}

header{position:sticky;top:0;z-index:40;border-bottom:1px solid var(--border);background:rgba(0,0,0,.45);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.header-inner{max-width:1280px;margin:0 auto;padding:12px 16px}
.header-top{display:flex;flex-wrap:wrap;align-items:center;gap:12px;justify-content:space-between}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-orb{width:46px;height:46px;border-radius:16px;border:1px solid var(--border);background:linear-gradient(135deg,rgba(65,165,255,.35),rgba(124,58,237,.15),rgba(10,10,10,.95));display:grid;place-items:center;position:relative;overflow:hidden;flex-shrink:0}
.logo-orb::before{content:'';position:absolute;inset:-40%;background:linear-gradient(120deg,transparent 20%,rgba(255,255,255,.5) 50%,transparent 80%);transform:translateX(-130%) rotate(10deg);animation:shine 5s ease-in-out infinite}
.logo-vt{font-size:1rem;font-weight:800;letter-spacing:.2em}
.logo-name p:first-child{font-size:.65rem;text-transform:uppercase;letter-spacing:.4em;color:var(--muted)}
.logo-name p:last-child{font-size:1rem;font-weight:600;letter-spacing:-.01em}
.header-actions{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.btn-sm{padding:7px 14px;border-radius:999px;font-size:.8rem;border:1px solid var(--border);background:var(--surface);transition:all .2s}
.btn-sm:hover{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.08)}
.btn-accent{background:var(--accent);border-color:transparent;font-weight:600}
.btn-accent:hover{opacity:.9}
.badge-green{padding:5px 12px;border-radius:999px;font-size:.75rem;border:1px solid rgba(52,211,153,.3);background:rgba(52,211,153,.1);color:#6ee7b7}
.badge-admin{padding:5px 12px;border-radius:999px;font-size:.75rem;border:1px solid rgba(52,211,153,.3);background:rgba(52,211,153,.1);color:#6ee7b7}
.badge-user{padding:5px 12px;border-radius:999px;font-size:.75rem;border:1px solid var(--border);background:var(--surface);color:var(--muted)}

/* Ticker */
.ticker-shell{overflow:hidden;border-radius:999px;border:1px solid var(--border);background:var(--surface);padding:6px 14px;font-size:.72rem;color:var(--muted);mask-image:linear-gradient(90deg,transparent,black 8%,black 92%,transparent);max-width:420px}
.ticker-track{display:inline-block;white-space:nowrap;animation:ticker var(--ticker-dur) linear infinite}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* Tabs */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 0 4px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 16px;border-radius:999px;font-size:.82rem;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s}
.tab:hover{color:#fff;border-color:rgba(255,255,255,.2)}
.tab.active{background:#fff;color:#0f172a;border-color:transparent;font-weight:600}

/* Shortcuts bar */
.shortcuts{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.shortcut{padding:5px 12px;border-radius:999px;font-size:.78rem;border:1px solid var(--border);background:var(--surface);transition:all .2s}
.shortcut:hover,.shortcut.active{background:var(--accent);border-color:transparent;color:#fff}

/* Main */
main{max-width:1280px;margin:0 auto;padding:20px 16px;position:relative;z-index:1}

/* Cards */
.card{border-radius:24px;border:1px solid var(--border);background:var(--surface);padding:18px;backdrop-filter:blur(12px)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.card-eyebrow{font-size:.65rem;text-transform:uppercase;letter-spacing:.35em;color:#38bdf8;margin-bottom:4px}
.card-title{font-size:1.15rem;font-weight:600}

/* Hero */
.hero{border-radius:28px;border:1px solid var(--border);padding:24px;background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.03),rgba(0,0,0,.28));box-shadow:0 30px 100px var(--glow);margin-bottom:20px}
.hero h2{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:700;line-height:1.15;letter-spacing:-.02em;margin:12px 0}
.hero p{color:var(--muted);line-height:1.7;max-width:58ch}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.hero-cta{padding:14px 22px;border-radius:20px;font-size:.9rem;font-weight:600;text-align:left}
.hero-cta-main{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 20px 50px var(--glow)}
.hero-cta-sec{background:rgba(0,0,0,.3);border:1px solid var(--border);color:#fff}
.hero-cta-main:hover,.hero-cta-sec:hover{transform:translateY(-2px)}
.hero-cta span:first-child{font-size:.65rem;text-transform:uppercase;letter-spacing:.3em;opacity:.7;display:block}

/* Metric cards */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.metric{border-radius:20px;border:1px solid var(--border);background:rgba(0,0,0,.2);padding:16px}
.metric-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.28em;color:var(--muted)}
.metric-val{font-size:2rem;font-weight:600;margin:10px 0 4px;letter-spacing:-.02em}
.metric-hint{font-size:.78rem;color:var(--muted)}

/* Grids */
.grid2{display:grid;gap:16px;grid-template-columns:1fr}
.grid3{display:grid;gap:12px}
@media(min-width:640px){.grid3{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.grid3{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.grid2{grid-template-columns:1.2fr .8fr}}
.side-col{display:grid;gap:16px}

/* Flow list */
.flow-item{border-radius:20px;border:1px solid var(--border);padding:14px;cursor:pointer;transition:all .2s;text-align:left;width:100%}
.flow-item:hover{border-color:rgba(255,255,255,.2)}
.flow-item.selected{background:#fff;color:#0f172a;border-color:transparent}
.flow-item.selected .flow-desc,.flow-item.selected .flow-badge{color:#64748b}
.flow-name{font-weight:600;font-size:.9rem}
.flow-desc{font-size:.8rem;color:var(--muted);margin-top:4px}
.flow-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tag{padding:3px 10px;border-radius:999px;font-size:.65rem;text-transform:uppercase;letter-spacing:.2em;border:1px solid var(--border);background:var(--surface)}
.flow-item.selected .tag{border-color:rgba(0,0,0,.1);background:rgba(0,0,0,.06);color:#334155}
.flow-badge{font-size:.65rem;text-transform:uppercase;letter-spacing:.25em;border:1px solid var(--border);background:var(--surface);padding:3px 8px;border-radius:999px}

/* Step badge */
.step-wrap{display:flex;gap:12px;align-items:flex-start}
.step-line-col{display:flex;flex-direction:column;align-items:center}
.step-icon{width:42px;height:42px;border-radius:14px;border:1px solid var(--border);background:#020617;display:grid;place-items:center;font-size:1.1rem;flex-shrink:0}
.step-connector-line{width:1px;height:40px;background:linear-gradient(180deg,var(--accent),rgba(255,255,255,.08));margin:2px 0}
.step-body{flex:1;border-radius:20px;border:1px solid var(--border);background:rgba(0,0,0,.25);padding:14px;min-width:0}
.step-kind-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.step-kind{font-size:.65rem;text-transform:uppercase;letter-spacing:.25em;border:1px solid var(--border);background:var(--surface);padding:3px 9px;border-radius:999px;color:var(--muted)}
.step-conn{font-size:.65rem;text-transform:uppercase;letter-spacing:.25em;padding:3px 9px;border-radius:999px}
.step-title{font-weight:600;font-size:.88rem}
.step-desc{font-size:.78rem;color:var(--muted);margin-top:4px}

/* Toggle */
.toggle-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;border-radius:20px;border:1px solid var(--border);background:rgba(0,0,0,.2);padding:14px}
.toggle-info p:first-child{font-weight:600;font-size:.88rem}
.toggle-info p:last-child{font-size:.78rem;color:var(--muted);margin-top:3px}
.toggle-btn{position:relative;width:52px;height:28px;border-radius:999px;transition:background .3s;flex-shrink:0;margin-top:2px}
.toggle-btn.on{background:var(--accent)}
.toggle-btn.off{background:#1e293b}
.toggle-thumb{position:absolute;top:4px;width:20px;height:20px;border-radius:999px;background:#fff;transition:transform .3s}
.toggle-btn.on .toggle-thumb{transform:translateX(28px)}
.toggle-btn.off .toggle-thumb{transform:translateX(4px)}

/* Sandbox logs */
.log-line{border-radius:14px;border:1px solid var(--border);background:rgba(2,6,23,.9);padding:8px 12px;font-size:.8rem;font-family:'JetBrains Mono',monospace;color:var(--muted)}

/* Widget preview */
.widget-card{border-radius:20px;border:1px solid var(--border);background:rgba(0,0,0,.2);padding:14px}
.widget-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.widget-name{font-size:.85rem;font-weight:600}
.widget-type{font-size:.6rem;text-transform:uppercase;letter-spacing:.28em;color:var(--muted)}
.badge-live{font-size:.6rem;text-transform:uppercase;letter-spacing:.28em;border:1px solid var(--border);padding:2px 8px;border-radius:999px;color:var(--muted)}

/* Chat */
.chat-msg{border-radius:18px;padding:12px 14px;font-size:.82rem;line-height:1.6;margin-bottom:8px}
.chat-msg.assistant{background:#020617;color:#cbd5e1}
.chat-msg.user{background:var(--accent);color:#fff}

/* Connector card */
.conn-card{border-radius:20px;border:1px solid var(--border);background:rgba(0,0,0,.2);padding:14px}
.conn-name{font-weight:600;font-size:.9rem}
.conn-desc{font-size:.78rem;color:var(--muted);margin-top:4px}
.conn-cat{font-size:.6rem;text-transform:uppercase;letter-spacing:.28em;border:1px solid var(--border);background:var(--surface);padding:3px 9px;border-radius:999px;color:var(--muted)}

/* Note card */
.note-card{border-radius:20px;border:1px solid var(--border);background:rgba(0,0,0,.2);padding:14px}
.note-title{font-weight:600;font-size:.9rem}
.note-content{font-size:.8rem;color:var(--muted);margin-top:8px;line-height:1.6;white-space:pre-wrap}
.note-date{font-size:.65rem;text-transform:uppercase;letter-spacing:.28em;color:#475569;margin-top:12px}

/* Quick link */
.quick-link{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;font-size:.85rem;font-weight:600;color:#fff;transition:transform .2s;text-decoration:none;margin:4px}
.quick-link:hover{transform:translateY(-2px)}

/* Pomodoro */
.pomo-wrap{display:flex;align-items:center;gap:8px;border-radius:999px;border:1px solid var(--border);background:var(--surface);padding:6px 12px}
.pomo-info{}
.pomo-mode{font-size:.6rem;text-transform:uppercase;letter-spacing:.3em;color:var(--muted)}
.pomo-time{font-size:.9rem;font-weight:700;letter-spacing:.05em}

/* News */
.news-card{border-radius:20px;border:1px solid var(--border);background:rgba(0,0,0,.2);padding:14px}
.news-name{font-weight:600;font-size:.88rem}
.news-cat{font-size:.75rem;color:var(--muted);margin-top:2px}
.news-headline{display:block;border-radius:12px;border:1px solid var(--border);background:rgba(2,6,23,.8);padding:8px 11px;font-size:.78rem;color:var(--muted);margin-top:6px;transition:all .2s}
.news-headline:hover{border-color:rgba(255,255,255,.2);color:#fff}
.news-summary{border-radius:12px;border:1px solid var(--border);background:var(--surface);padding:10px 11px;font-size:.75rem;color:var(--muted);margin-top:8px}

/* Range */
input[type=range]{padding:0;height:6px;border-radius:999px;border:none;background:#1e293b;cursor:pointer;-webkit-appearance:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:999px;background:var(--accent);cursor:pointer}
input[type=color]{padding:4px;height:48px;border-radius:14px}
input[type=number]{padding:8px 12px}

/* Artifact preview */
.artifact-preview{height:360px;width:100%;border-radius:18px;border:1px solid var(--border);background:#020617}
.code-editor{width:100%;border-radius:18px;border:1px solid var(--border);background:#020617;padding:14px;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:#a5f3fc;resize:vertical;min-height:200px}

/* Admin hash */
.hash-box{border-radius:14px;border:1px solid var(--border);background:#020617;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);word-break:break-all}

/* Folder btn */
.folder-btn{border-radius:18px;border:1px solid var(--border);background:rgba(0,0,0,.2);padding:11px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;font-size:.88rem}
.folder-btn:hover{border-color:rgba(255,255,255,.2)}
.folder-btn.active{background:#fff;color:#0f172a;border-color:transparent}
.folder-dot{width:12px;height:12px;border-radius:999px;flex-shrink:0}

/* Gate app btn */
.gate-btn{border-radius:20px;border:1px solid var(--border);padding:14px;cursor:pointer;transition:all .2s;text-align:left;width:100%;background:rgba(0,0,0,.2)}
.gate-btn:hover{border-color:rgba(255,255,255,.2)}
.gate-btn.active{background:#fff;color:#0f172a;border-color:transparent}
.gate-btn.active .gate-desc{color:#64748b}

/* Sections */
.section-gap{display:grid;gap:16px;margin-bottom:16px}
.row-2{display:grid;gap:12px;grid-template-columns:1fr}
@media(min-width:700px){.row-2{grid-template-columns:1fr 1fr}}
.row-sidebar{display:grid;gap:16px}
@media(min-width:960px){.row-sidebar{grid-template-columns:320px 1fr}}
.row-sidebar-r{display:grid;gap:16px}
@media(min-width:960px){.row-sidebar-r{grid-template-columns:1fr 320px}}
.row-editor{display:grid;gap:16px}
@media(min-width:900px){.row-editor{grid-template-columns:1fr 300px}}

.gap-3{display:grid;gap:10px}
.gap-2{display:grid;gap:8px}
.flex-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.mt-2{margin-top:8px}
.mt-3{margin-top:12px}
.mt-4{margin-top:16px}
.text-muted{color:var(--muted);font-size:.82rem}
.text-xs-up{font-size:.65rem;text-transform:uppercase;letter-spacing:.3em;color:var(--muted)}
.font-semi{font-weight:600}
.text-sm{font-size:.85rem}

@keyframes shine{0%{transform:translateX(-130%) rotate(10deg)}55%,100%{transform:translateX(130%) rotate(10deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease-out}

/* Legal */
.legal-text{font-size:.88rem;line-height:1.8;color:var(--muted)}
.legal-text p{margin-bottom:14px}

.pwa-install-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;border:1px solid rgba(65,165,255,.4);background:rgba(65,165,255,.1);color:var(--accent);font-weight:600;font-size:.8rem;transition:all .2s;animation:installPulse 2.5s ease-in-out infinite}
.pwa-install-btn:hover{background:rgba(65,165,255,.2);border-color:var(--accent);color:#fff}
@keyframes installPulse{0%,100%{box-shadow:0 0 20px var(--glow)}50%{box-shadow:0 0 35px rgba(65,165,255,.5)}}
.pwa-dot{width:8px;height:8px;border-radius:999px;background:var(--accent);animation:ping 1s cubic-bezier(0,0,.2,1) infinite}
@keyframes ping{75%,100%{transform:scale(2);opacity:0}}

/* Template cards */
.tpl-card{border-radius:20px;border:1px solid var(--border);background:rgba(0,0,0,.2);padding:14px}
.tpl-name{font-weight:600;font-size:.88rem;line-height:1.3}
.tpl-summary{font-size:.78rem;color:var(--muted);margin-top:6px}

/* Version history */
.version-item{border-radius:12px;border:1px solid var(--border);background:rgba(2,6,23,.8);padding:8px 12px;font-size:.8rem}

/* Premium features */
.premium-card{border-radius:20px;border:1px solid var(--border);background:rgba(0,0,0,.2);padding:14px}
.premium-card h3{font-weight:600;font-size:.9rem}
.premium-card p{font-size:.78rem;color:var(--muted);margin-top:4px}

/* Separator */
.sep{height:1px;background:var(--border);margin:12px 0}

/* artifact lib */
.artifact-card{border-radius:20px;border:1px solid var(--border);background:rgba(0,0,0,.2);padding:14px}
</style>
</head>
<body>
<div class="app">
<div class="bg-grid"></div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="logo-wrap">
        <div class="logo-orb"><span class="logo-vt">VT</span></div>
        <div class="logo-name">
          <p>Automation OS</p>
          <p>VICO Tékton</p>
        </div>
      </div>
      <div class="header-actions">
        <div class="pomo-wrap">
          <button class="btn-sm btn-accent" id="pomoBtn" onclick="togglePomo()" style="padding:5px 12px;font-size:.75rem">Pomodoro</button>
          <div class="pomo-info" style="margin-left:4px">
            <p class="pomo-mode" id="pomoMode">FOCUS</p>
            <p class="pomo-time" id="pomoTime">25:00</p>
          </div>
        </div>
        <button class="btn-sm" onclick="toggleDark()" id="darkBtn">Dark on</button>
        <button class="btn-sm" onclick="toggleFullscreen()">⛶ Full</button>
        <span id="adminBadge" class="badge-user">Modo usuario</span>
        <button id="installBtn" class="pwa-install-btn" style="display:none" onclick="doInstall()">
          <span class="pwa-dot"></span>Instalar App
        </button>
      </div>
    </div>

    <!-- Shortcuts -->
    <div class="shortcuts" id="shortcutsBar" style="margin-top:8px"></div>

    <!-- Tabs -->
    <div class="tabs" id="tabsBar"></div>

    <!-- Ticker -->
    <div id="tickerWrap" style="margin-top:8px;display:none">
      <div class="ticker-shell"><div class="ticker-track" id="tickerTrack"></div></div>
    </div>
  </div>
</header>

<main id="mainContent"></main>
</div>

<script>
// ══════════════════════════════════════════════════════
//  VICO Tékton — Vanilla JS App (sin dependencias)
// ══════════════════════════════════════════════════════

// ── Helpers ──────────────────────────────────────────
const uid = (p='id') => p+'_'+Math.random().toString(36).slice(2,9);
const now = () => new Date().toISOString();
const fmt = (s) => {
  const m = String(Math.floor(s/60)).padStart(2,'0');
  const sec = String(Math.floor(s%60)).padStart(2,'0');
  return m+':'+sec;
};
const el = (id) => document.getElementById(id);
const q = (sel,ctx=document) => ctx.querySelector(sel);
const qa = (sel,ctx=document) => [...ctx.querySelectorAll(sel)];

function save(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch(e){}}
function load(key,def){
  try{const v=localStorage.getItem(key);return v?JSON.parse(v):def}
  catch(e){return def}
}

async function hashStr(s){
  if(!window.crypto?.subtle) return s;
  const buf = await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function dlFile(name,content,type='application/json'){
  const blob = new Blob([content],{type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url;a.download=name;a.click();
  URL.revokeObjectURL(url);
}

async function copyClip(text){
  try{await navigator.clipboard.writeText(text);return true}
  catch(e){return false}
}

function genAISteps(goal){
  const l=goal.toLowerCase();
  const steps=[];
  if(l.includes('drive')||l.includes('archivo'))
    steps.push(makeStep('Detectar archivo nuevo','Google Drive','trigger','Escucha cambios en una carpeta clave.','#38bdf8'));
  else
    steps.push(makeStep('Escuchar entrada universal','Webhooks','trigger','Entrada adaptable para formularios o apps externas.','#38bdf8'));
  if(l.includes('pdf'))
    steps.push(makeStep('Transformar a PDF','API REST','action','Conversión con validación de formato.','#6366f1'));
  if(l.includes('notion'))
    steps.push(makeStep('Guardar en Notion','Notion','action','Crea o actualiza una página con metadata clave.','#8b5cf6'));
  if(l.includes('email')||l.includes('correo'))
    steps.push(makeStep('Enviar email transaccional','Email (SMTP/IMAP)','output','Entrega resumen y enlaces de seguimiento.','#f59e0b'));
  if(l.includes('slack')||l.includes('whatsapp')||l.includes('telegram')){
    const conn=l.includes('slack')?'Slack':l.includes('telegram')?'Telegram':'WhatsApp';
    steps.push(makeStep('Notificar en '+conn,conn,'output','Mensaje corto con contexto accionable.','#22c55e'));
  }
  if(!steps.some(s=>s.kind==='ai'))
    steps.splice(Math.min(1,steps.length),0,makeStep('Optimizar payload con IA','Claude AI','ai','Añade campos, valida tono y sugiere pasos.','#f43f5e'));
  if(steps.length<4)
    steps.push(makeStep('Registrar evento final','Google Sheets','action','Auditoría ligera del flujo ejecutado.','#14b8a6'));
  return steps.slice(0,5);
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  state.showInstall=true; render();
});
window.addEventListener('appinstalled',()=>{
  state.pwaInstalled=true; state.showInstall=false; render();
});
async function doInstall(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  deferredPrompt=null;
  if(outcome==='accepted'){state.pwaInstalled=true;state.showInstall=false;render();}
}
function isPWAInstalled(){
  return window.matchMedia('(display-mode: standalone)').matches||navigator.standalone===true;
}

// ── Pomodoro ──────────────────────────────────────────
function togglePomo(){
  state.pomodoro.running = !state.pomodoro.running;
  if(state.pomodoro.running){
    state.pomoTimer = setInterval(()=>{
      if(state.pomodoro.remaining<=1){
        const next = state.pomodoro.mode==='focus'?'break':'focus';
        const mins = next==='focus'?state.pomodoro.focusMin:state.pomodoro.breakMin;
        state.pomodoro = {...state.pomodoro,mode:next,remaining:mins*60,running:false};
        clearInterval(state.pomoTimer);
      } else {
        state.pomodoro.remaining--;
      }
      el('pomoTime').textContent = fmt(state.pomodoro.remaining);
      el('pomoMode').textContent = state.pomodoro.mode.toUpperCase();
      el('pomoBtn').textContent = state.pomodoro.running?'Pausa':'▶';
    },1000);
  } else {
    clearInterval(state.pomoTimer);
  }
  el('pomoBtn').textContent = state.pomodoro.running?'Pausa':'▶';
}

function applyTheme(){
  const root=document.documentElement;
  if(state.darkMode){
    root.style.setProperty('--bg','#05070d');
    root.style.setProperty('--surface','rgba(255,255,255,.04)');
    root.style.setProperty('--border','rgba(255,255,255,.10)');
    root.style.setProperty('--text','#fff');
    root.style.setProperty('--muted','#94a3b8');
    document.body.style.background='#05070d';
  } else {
    root.style.setProperty('--bg','#eff5ff');
    root.style.setProperty('--surface','rgba(0,0,0,.04)');
    root.style.setProperty('--border','rgba(0,0,0,.12)');
    root.style.setProperty('--text','#0f172a');
    root.style.setProperty('--muted','#475569');
    document.body.style.background='#eff5ff';

}

  el('tickerWrap').style.display = visible?'block':'none';

    const src = state.newsSources.filter(s=>state.rssLang==='both'||s.lang===state.rssLang);

    document.documentElement.style.setProperty('--ticker-dur', Math.max(14,60-state.tickerSpeed)+'s');
  }
}

function renderFlowPreview(){

  if(!f) return '<p class="text-muted">Crea un flujo para empezar.</p>';
  return `
    <div class="gap-3">
      <div class="widget-card">
        <div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start">
          <div><p class="font-semi">${f.name}</p><p class="text-muted mt-2" style="font-size:.78rem">${f.description}</p></div>
          <span class="flow-badge">v${f.version}</span>
        </div>
        <div class="flow-tags mt-2">${f.steps.map(s=>`<span class="tag">${s.connector}</span>`).join('')}</div>
      </div>

function escHtml(s){ return s.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return s.replace(/"/g,'&quot;'); }

}
function addNewFlow(){
  const f = flowFromTemplate(state.flows.length);

  state.sandboxLogs = [];
  saveFlows(); renderMain();
}
function selectFlow(id){ state.selectedFlowId=id; state.sandboxLogs=[]; renderMain(); }
function applyAI(){
  if(!state.integratedAI) return;
  const f = selectedFlow(); if(!f) return;
  const steps = genAISteps(state.flowPrompt);
  state.flows = state.flows.map(fl=>fl.id===f.id?{...fl,steps,description:'Blueprint IA para: '+state.flowPrompt,version:fl.version+1,versions:[{version:fl.version+1,label:'IA generó blueprint',at:now()},...fl.versions]}:fl);
  state.sandboxLogs=['IA integrada creó una secuencia optimizada de 3–5 pasos.'];
  saveFlows(); renderMain();
}
function runSandbox(){
  const f = selectedFlow(); if(!f) return;
  state.sandboxLogs=[];
  state.flows = state.flows.map(fl=>fl.id===f.id?{...fl,status:'sandbox',versions:[{version:fl.version,label:'Sandbox ejecutado',at:now()},...fl.versions]}:fl);
  const speed = Math.max(220, 850/Math.max(state.animSpeed,0.6));
  f.steps.forEach((s,i)=>{
    setTimeout(()=>{
      state.sandboxLogs.push(`${i+1}. ${s.title} • ${s.connector} • ${s.kind==='ai'?'IA enriqueciendo payload':'OK'}`);
      renderMain();
    },i*speed);
  });
  saveFlows(); renderMain();
}
function deployFlow(){
  const f = selectedFlow(); if(!f) return;
  state.flows = state.flows.map(fl=>fl.id===f.id?{...fl,status:'live',version:fl.version+1,versions:[{version:fl.version+1,label:'Deploy one-click',at:now()},...fl.versions]}:fl);
  state.sandboxLogs.push('Flow desplegado en modo live. Runtime listo.');
  saveFlows(); renderMain();
}

  const f = selectedFlow(); if(!f||!state.adminUnlocked) return;

function uploadGateFile(e){
  const file=e.target.files?.[0]; if(!file) return;
  const ext=file.name.split('.').pop()?.toLowerCase();
  const ftype=ext==='html'?'html':ext==='js'?'js':ext==='json'?'json':'zip';
  if(ftype!=='zip'){
    const reader=new FileReader();
    reader.onload=()=>{
      const content=reader.result;
      state.gateApps.unshift({id:uid('g'),name:file.name,type:ftype,srcDoc:ftype==='html'?content:`<pre style='white-space:pre-wrap;padding:18px;color:white;background:#020617;font-family:monospace'>${String(content).replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`,description:`Archivo ${ftype.toUpperCase()} cargado en biblioteca local.`,createdAt:now()});
      save('vt_gate',state.gateApps); renderMain();
    };
    reader.readAsText(file);
  } else {
    state.gateApps.unshift({id:uid('g'),name:file.name,type:'zip',description:'ZIP registrado en biblioteca.',createdAt:now()});
    save('vt_gate',state.gateApps); renderMain();
  }
}
function sendGateMsg(){
  if(!state.gatePrompt.trim()) return;
  const l=state.gatePrompt.toLowerCase();
  let reply='Sugerencia VICOgate: combina biblioteca por URL, cargas locales y políticas de permisos. Prioriza módulos reutilizables e isolamiento por origen.';
  if(l.includes('iframe')||l.includes('embed')) reply='Usa URL para entornos abiertos y HTML local para sandbox. Si una PWA bloquea iframe, muestra CTA de apertura en nueva pestaña.';
  else if(l.includes('admin')) reply='Marca la app como adminOnly cuando la biblioteca deba ocultarla a usuarios estándar.';
  else if(l.includes('sandbox')) reply='Para sandbox seguro, carga HTML/JS/JSON por separado, registra metadata y ejecuta previews en contenedores aislados.';
  state.gateMessages.push({id:uid('gm'),role:'user',content:state.gatePrompt.trim()});
  state.gateMessages.push({id:uid('gm'),role:'assistant',content:reply});
  state.gatePrompt='';
  save('vt_gateMsgs',state.gateMessages); renderMain();
}

function copyArtCode(){ copyClip(state.artifactDraft.code); }
function copyArtifactCode(id){ const a=state.artifacts.find(x=>x.id===id);if(a) copyClip(a.code); }
function openArtifact(id){ const a=state.artifacts.find(x=>x.id===id);if(a){ state.artifactDraft={...state.artifactDraft,title:a.title,prompt:a.prompt,type:a.type,code:a.code}; renderMain(); } }
function deleteArtifact(id){ state.artifacts=state.artifacts.filter(a=>a.id!==id);save('vt_artifacts',state.artifacts);renderMain(); }
function dlArtifact(){ dlFile(`vico-flow.${state.artifactDraft.type==='react'?'tsx':state.artifactDraft.type}`,state.artifactDraft.code,'text/plain'); }

// News
function saveSource(){
  if(!state.sourceDraft.name.trim()||!state.sourceDraft.url.trim()) return;
  const src={id:state.editingSourceId||uid('ns'),name:state.sourceDraft.name.trim(),lang:state.sourceDraft.lang,category:state.sourceDraft.category.trim(),url:state.sourceDraft.url.trim(),headlines:[state.sourceDraft.headline.trim()||'Nueva fuente manual añadida.']};
  if(state.editingSourceId) state.newsSources=state.newsSources.map(s=>s.id===state.editingSourceId?src:s);
  else state.newsSources.unshift(src);
  state.sourceDraft={name:'',lang:'es',category:'IA',url:'https://',headline:''};
  state.editingSourceId=null;
  save('vt_news',state.newsSources); renderTabs(); renderMain();
}
function editSource(id){
  const s=state.newsSources.find(x=>x.id===id); if(!s) return;
  state.editingSourceId=id;
  state.sourceDraft={name:s.name,lang:s.lang,category:s.category,url:s.url,headline:s.headlines[0]||''};
  renderMain();
}
function cancelEditSource(){state.editingSourceId=null;state.sourceDraft={name:'',lang:'es',category:'IA',url:'https://',headline:''};renderMain();}
function deleteSource(id){state.newsSources=state.newsSources.filter(s=>s.id!==id);save('vt_news',state.newsSources);renderTabs();renderMain();}

// Settings toggles
function toggle(key){
  state[key]=!state[key];
  const keyMap={integratedAI:'vt_ai',offlineFirst:'vt_offline',scriptEditor:'vt_scriptEditor',sandboxMode:'vt_sandbox',soundEnabled:'vt_sound',rssEnabled:'vt_rssEnabled',advancedHashes:'vt_hashes'};
  if(keyMap[key]) save(keyMap[key],state[key]);
  renderTabs(); renderMain();
}
function toggleShortcut(id){
  if(state.navShortcuts.includes(id)) state.navShortcuts=state.navShortcuts.filter(x=>x!==id);
  else state.navShortcuts.push(id);
  save('vt_shortcuts',state.navShortcuts);
  renderTabs(); renderMain();
}
function exportFlows(){ dlFile('vico-tekton-flows.json',JSON.stringify({exportedAt:now(),app:'VICO Tékton',flows:state.flows},null,2)); }
function importFlows(e){
  const file=e.target.files?.[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const p=JSON.parse(r.result);
      const imported=Array.isArray(p)?p:p.flows;
      if(Array.isArray(imported)&&imported.length>0){state.flows=imported;state.selectedFlowId=imported[0].id;saveFlows();renderMain();}
    }catch(err){}
  };
  r.readAsText(file);
}
async function unlockAdmin(){
  const h=await hashStr(state.adminPassword.trim());
  // Garantizar que baseHash siempre esté disponible
  if(!state.baseHash) state.baseHash = await hashStr(ADMIN_SECRET);
  const target=state.adminKey?.hash||state.baseHash;
  if(h&&target&&h===target){
    state.adminUnlocked=true;
    state.adminFeedback='Modo admin desbloqueado. Premium activo.';
    save('vt_adminUnlocked',true);
  } else {
    state.adminUnlocked=false;
    state.adminFeedback='Clave inválida. Verifica la contraseña o importa la llave JSON.';
    save('vt_adminUnlocked',false);
  }
  renderTabs(); renderMain();
}
async function exportAdminKey(){
  // Siempre recomputar desde ADMIN_SECRET para garantizar coherencia
  const hash = await hashStr(ADMIN_SECRET);
  const payload={
    label:'VICO Tékton Master Key',
    format:'SHA-256 JSON',
    algorithm:'SHA-256',
    hashEngine:'SHA-256 / WebCrypto',
    hash,
    secret_hint: ADMIN_SECRET.slice(0,3)+'***',
    createdAt:now(),
    permissions:['advanced-visual-editor','premium-marketplace','apk-pwa-export']
  };
  state.adminKey=payload;
  state.baseHash=hash;
  save('vt_adminKey',payload);
  dlFile('vico-master-key.json',JSON.stringify(payload,null,2));
  state.adminFeedback='Llave JSON descargada y guardada localmente.';
  renderMain();
}
function importAdminKey(e){
  const file=e.target.files?.[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const p=JSON.parse(r.result);
      if(p.hash){state.adminKey=p;save('vt_adminKey',p);state.adminFeedback='Llave maestra cargada. Lista para validar.';renderMain();}
    }catch(err){state.adminFeedback='No se pudo leer la llave JSON.';}
  };
  r.readAsText(file);
}
function exportPwaSpec(){
  dlFile('vico-pwa-export-spec.json',JSON.stringify({app:'VICO Tékton',mode:'PWA export profile',premium:true,createdAt:now(),manifest:{name:'VICO Tékton',display:'standalone',theme_color:'#030712'},distribution:['Play Store','App Store','PWA standalone'],flows:state.flows.length},null,2));
}

// Bind dynamic events (re-bind after each render for inputs that need live sync)
function bindEvents(){
  // Sync artCode textarea → state
  const artCode = el('artCode');
  if(artCode) artCode.addEventListener('input',()=>{state.artifactDraft.code=artCode.value;});
}

// ── Init ──────────────────────────────────────────────
applyTheme();
document.documentElement.style.setProperty('--accent',state.accent);
document.documentElement.style.setProperty('--glow',state.accent+'44');
renderTabs();
renderMain();

// PWA check
if(isPWAInstalled()){ state.pwaInstalled=true; renderTabs(); }

// ── Service Worker Registration ──────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./tekton-sw.js')
      .then(reg => console.log('[TEKTON] SW registrado, scope:', reg.scope))
      .catch(err => console.error('[TEKTON] Error al registrar SW:', err));
  });
}
</script>
